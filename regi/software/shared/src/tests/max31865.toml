name = "MAX31865"
version = 1
description = "RTD-to-Digital converter schema for MAX31865 temperature sensor"

[[registers]]
register_id = 1
name = "CONFIG"
description = "Configuration register"
address = 0x00

[[registers.bits]]
bit_id = 1
bit_ordinal = 7
bit_type = "ReadWrite"
reset_val = 0
description = "VBIAS enable"

[[registers.bits]]
bit_id = 2
bit_ordinal = 6
bit_type = "ReadWrite"
reset_val = 0
description = "Conversion mode auto"

[[registers.bits]]
bit_id = 3
bit_ordinal = 5
bit_type = "ReadWrite"
reset_val = 0
description = "1-shot conversion"

[[registers.bits]]
bit_id = 4
bit_ordinal = 4
bit_type = "ReadWrite"
reset_val = 0
description = "3-wire select"

[[registers.bits]]
bit_id = 5
bit_ordinal = 3
bit_type = "ReadWrite"
reset_val = 0
description = "Fault detect cycle 1"

[[registers.bits]]
bit_id = 6
bit_ordinal = 2
bit_type = "ReadWrite"
reset_val = 0
description = "Fault detect cycle 2"

[[registers.bits]]
bit_id = 7
bit_ordinal = 1
bit_type = "ReadWrite"
reset_val = 0
description = "Fault status clear"

[[registers.bits]]
bit_id = 8
bit_ordinal = 0
bit_type = "ReadOnly"
reset_val = 0
description = "Fault detected"

[[registers]]
register_id = 2
name = "RTD_MSB"
description = "RTD resistance data MSB"
address = 0x01
bits = []

[[registers]]
register_id = 3
name = "RTD_LSB"
description = "RTD resistance data LSB"
address = 0x02
bits = []

[[registers]]
register_id = 4
name = "HIGH_FAULT_MSB"
description = "High fault threshold MSB"
address = 0x03
bits = []

[[registers]]
register_id = 5
name = "HIGH_FAULT_LSB"
description = "High fault threshold LSB"
address = 0x04
bits = []

[[registers]]
register_id = 6
name = "LOW_FAULT_MSB"
description = "Low fault threshold MSB"
address = 0x05
bits = []

[[registers]]
register_id = 7
name = "LOW_FAULT_LSB"
description = "Low fault threshold LSB"
address = 0x06
bits = []

[[registers]]
register_id = 8
name = "FAULT_STATUS"
description = "Fault status register"
address = 0x07

[[registers.bits]]
bit_id = 9
bit_ordinal = 7
bit_type = "ReadOnly"
reset_val = 0
description = "High threshold fault"

[[registers.bits]]
bit_id = 10
bit_ordinal = 6
bit_type = "ReadOnly"
reset_val = 0
description = "Low threshold fault"

[[registers.bits]]
bit_id = 11
bit_ordinal = 5
bit_type = "ReadOnly"
reset_val = 0
description = "REFIN- > 0.85 x VBIAS"

[[registers.bits]]
bit_id = 12
bit_ordinal = 4
bit_type = "ReadOnly"
reset_val = 0
description = "REFIN- < 0.85 x VBIAS"

[[registers.bits]]
bit_id = 13
bit_ordinal = 3
bit_type = "ReadOnly"
reset_val = 0
description = "RTDIN- < 0.85 x VBIAS"

[[registers.bits]]
bit_id = 14
bit_ordinal = 2
bit_type = "ReadOnly"
reset_val = 0
description = "Overvoltage / undervoltage fault"

[[interpreters]]
interpreter_id = 1
name = "Temperature Decoder"
description = "Convert RTD raw ADC code into Celsius"
register_ids = [2, 3]
translator_id = 1

[[interpreters]]
interpreter_id = 2
name = "Fault Decoder"
description = "Interpret FAULT_STATUS bits"
register_ids = [8]
translator_id = 2

[[translator]]
translator_id = 1
translator_type = "Formula"
formula = { Str = "((RTD_MSB << 8) | RTD_LSB) >> 1" }

[[translator]]
translator_id = 2
translator_type = "Pair"

[translator.formula.KeyPair.0]
description = "No fault"

[translator.formula.KeyPair.1]
description = "Fault active"
